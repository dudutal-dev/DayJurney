<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e0e20"/>
      <stop offset="100%" stop-color="#06060e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c870" stop-opacity="1"/>
      <stop offset="60%" stop-color="#d4a843" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c49040" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle glow behind -->
  <circle cx="256" cy="230" r="180" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#d4a843" stroke-width="1.5" stroke-opacity="0.18"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#d4a843" stroke-width="1" stroke-opacity="0.09"/>

  <!-- 8 radiating lines (like compass rays) -->
  <g stroke="#d4a843" stroke-opacity="0.15" stroke-width="1">
    <line x1="256" y1="56" x2="256" y2="86"/>
    <line x1="256" y1="426" x2="256" y2="456"/>
    <line x1="56" y1="256" x2="86" y2="256"/>
    <line x1="426" y1="256" x2="456" y2="256"/>
    <line x1="107" y1="107" x2="128" y2="128"/>
    <line x1="384" y1="384" x2="405" y2="405"/>
    <line x1="405" y1="107" x2="384" y2="128"/>
    <line x1="128" y1="384" x2="107" y2="405"/>
  </g>

  <!-- 4 small diamonds on outer ring -->
  <g fill="#d4a843" fill-opacity="0.35">
    <polygon points="256,44 260,56 256,68 252,56"/>
    <polygon points="256,444 260,456 256,468 252,456"/>
    <polygon points="44,256 56,260 68,256 56,252"/>
    <polygon points="444,256 456,260 468,256 456,252"/>
  </g>

  <!-- Central 6-pointed star (Magen David) subtle -->
  <g fill="none" stroke="#d4a843" stroke-opacity="0.12" stroke-width="1.5" transform="translate(256,256)">
    <polygon points="0,-95 82,47.5 -82,47.5"/>
    <polygon points="0,95 -82,-47.5 82,-47.5"/>
  </g>

  <!-- Large glowing central aleph/star shape -->
  <!-- 8-pointed star as the main icon -->
  <g filter="url(#glow-filter)" transform="translate(256,256)">
    <!-- 8 pointed star -->
    <polygon points="
      0,-88
      20,-20
      88,0
      20,20
      0,88
      -20,20
      -88,0
      -20,-20"
      fill="url(#star-glow)"
      opacity="0.92"/>
    <!-- Inner smaller rotated star -->
    <polygon points="
      0,-55
      13,-13
      55,0
      13,13
      0,55
      -13,13
      -55,0
      -13,-13"
      fill="#06060e"
      opacity="0.6"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="28" fill="url(#star-glow)" opacity="0.95"/>
    <circle cx="0" cy="0" r="18" fill="#06060e" opacity="0.75"/>
    <!-- Tiny center glow -->
    <circle cx="0" cy="0" r="8" fill="#f0e6d0" opacity="0.9"/>
  </g>

  <!-- Hebrew aleph א in center -->
  <text
    x="256" y="272"
    font-family="'Times New Roman', serif"
    font-size="52"
    font-weight="400"
    fill="#f0e6d0"
    fill-opacity="0.88"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-2">א</text>

  <!-- 4 small stars at compass points (inner) -->
  <g fill="#d4a843" fill-opacity="0.55">
    <circle cx="256" cy="148" r="3.5"/>
    <circle cx="256" cy="364" r="3.5"/>
    <circle cx="148" cy="256" r="3.5"/>
    <circle cx="364" cy="256" r="3.5"/>
  </g>

  <!-- Corner star accents -->
  <g fill="#d4a843" fill-opacity="0.28" font-size="14" font-family="serif">
    <text x="160" y="165" text-anchor="middle">✦</text>
    <text x="352" y="165" text-anchor="middle">✦</text>
    <text x="160" y="358" text-anchor="middle">✦</text>
    <text x="352" y="358" text-anchor="middle">✦</text>
  </g>
</svg>
